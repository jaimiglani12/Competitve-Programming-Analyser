<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CF Analyzer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; }

  header {
    background: #1a1a2e; color: white;
    padding: 18px 40px; display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 20px; }
  header span { font-size: 13px; color: #aaa; margin-left: 10px; }

  .container { max-width: 960px; margin: 30px auto; padding: 0 20px 60px; }

  /* Search */
  .search-box {
    background: white; padding: 20px 24px;
    border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    display: flex; gap: 10px; margin-bottom: 20px;
  }
  .search-box input {
    flex: 1; padding: 10px 14px;
    border: 1px solid #ddd; border-radius: 6px; font-size: 15px; outline: none;
  }
  .search-box input:focus { border-color: #1a1a2e; }
  .search-box button {
    padding: 10px 26px; background: #1a1a2e; color: white;
    border: none; border-radius: 6px; font-size: 15px; cursor: pointer;
  }
  .search-box button:hover { background: #2d2d5e; }
  .search-box button:disabled { background: #999; cursor: not-allowed; }

  .sleep-note {
    background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px;
    padding: 10px 16px; font-size: 13px; color: #795548; margin-bottom: 16px;
  }

  #loading { display:none; text-align:center; padding:40px; color:#666; }
  #error   { display:none; background:#fff0f0; border:1px solid #f5c2c2; border-radius:8px; padding:14px 18px; color:#c0392b; margin-bottom:18px; }
  #dashboard { display:none; }

  /* Profile card */
  .profile-card {
    background:white; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.08);
    padding:20px 24px; display:flex; align-items:center; gap:18px; margin-bottom:20px;
  }
  .avatar {
    width:52px; height:52px; border-radius:50%;
    background:#1a1a2e; color:white;
    display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:bold; flex-shrink:0;
  }
  .profile-info h2 { font-size:20px; }
  .profile-info p  { font-size:13px; color:#777; margin-top:3px; }

  /* Tabs */
  .tabs { display:flex; gap:0; border-bottom:2px solid #ddd; margin-bottom:20px; overflow-x:auto; }
  .tab {
    padding:10px 20px; background:none; border:none; cursor:pointer;
    font-size:14px; color:#666; border-bottom:2px solid transparent; margin-bottom:-2px;
    white-space:nowrap;
  }
  .tab.active { color:#1a1a2e; border-bottom-color:#1a1a2e; font-weight:bold; }
  .tab:hover  { color:#1a1a2e; }

  .panel { display:none; }
  .panel.active { display:block; }

  /* Stat cards */
  .cards-grid {
    display:grid; gap:14px; margin-bottom:20px;
    grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
  }
  .card {
    background:white; border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.07);
    padding:16px 18px; border-top:3px solid #1a1a2e;
  }
  .card .label { font-size:11px; color:#999; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .card .value { font-size:24px; font-weight:bold; color:#1a1a2e; }

  /* Box */
  .box {
    background:white; border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.07);
    padding:18px 22px; margin-bottom:18px;
  }
  .box h3 {
    font-size:12px; color:#999; text-transform:uppercase;
    letter-spacing:1px; margin-bottom:14px;
    border-bottom:1px solid #f0f0f0; padding-bottom:10px;
  }

  /* Tag bars */
  .tag-row { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
  .tag-name { font-size:13px; color:#444; width:160px; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bar-bg   { flex:1; height:8px; background:#f0f0f0; border-radius:4px; overflow:hidden; }
  .bar-fill { height:100%; background:#1a1a2e; border-radius:4px; }
  .tag-cnt  { font-size:12px; color:#999; width:30px; text-align:right; }

  /* Diff pills */
  .pills { display:flex; gap:12px; flex-wrap:wrap; }
  .pill  { padding:10px 18px; border-radius:20px; font-size:14px; font-weight:bold; }
  .pill.easy   { background:#e8f8f0; color:#27ae60; }
  .pill.medium { background:#fef9e7; color:#e67e22; }
  .pill.hard   { background:#fde8ec; color:#e74c3c; }

  /* Month grid */
  .month-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; }
  .month-cell { background:#f9f9f9; border-radius:6px; padding:10px 6px; text-align:center; }
  .month-cell .mname { font-size:11px; color:#999; margin-bottom:4px; }
  .month-cell .mval  { font-size:16px; font-weight:bold; color:#1a1a2e; }

  /* Table */
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { padding:10px 12px; text-align:left; border-bottom:1px solid #f0f0f0; }
  th { font-size:12px; color:#999; font-weight:normal; text-transform:uppercase; letter-spacing:1px; }
  td:last-child { font-weight:bold; color:#1a1a2e; }

  /* Insights */
  .insight-item {
    display:flex; gap:12px; align-items:flex-start;
    padding:12px 14px; background:#f9f9f9;
    border-radius:6px; margin-bottom:10px; font-size:14px; color:#444;
  }
  .insight-item .icon { font-size:18px; flex-shrink:0; }
</style>
</head>
<body>

<header>
  <div>
    <h1>⌨ CF Analyzer</h1>
    <span>Codeforces Profile Analyzer</span>
  </div>
</header>

<div class="container">

  <div class="search-box">
    <input type="text" id="handleInput" placeholder="Enter Codeforces handle (e.g. tourist)" />
    <button id="searchBtn" onclick="analyze()">Analyze</button>
  </div>

  <div class="sleep-note">
    ⏱ First load may take up to 30 seconds — the server wakes up on first request (Render free tier).
  </div>

  <div id="error"></div>
  <div id="loading">⏳ Fetching data, please wait...</div>

  <div id="dashboard">

    <div class="profile-card">
      <div class="avatar" id="avatarEl"></div>
      <div class="profile-info">
        <h2 id="profileHandle"></h2>
        <p id="profileSubtitle"></p>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('overview',this)">Overview</button>
      <button class="tab" onclick="switchTab('topics',this)">Topics</button>
      <button class="tab" onclick="switchTab('difficulty',this)">Difficulty</button>
      <button class="tab" onclick="switchTab('progress',this)">Progress</button>
      <button class="tab" onclick="switchTab('contest',this)">Contest</button>
      <button class="tab" onclick="switchTab('insights',this)">Insights</button>
    </div>

    <!-- Overview -->
    <div class="panel active" id="panel-overview">
      <div class="cards-grid" id="overviewCards"></div>
      <div class="box">
        <h3>Top Topics</h3>
        <div id="topTopics"></div>
      </div>
    </div>

    <!-- Topics -->
    <div class="panel" id="panel-topics">
      <div class="box">
        <h3>All Topics</h3>
        <div id="allTopics"></div>
      </div>
    </div>

    <!-- Difficulty -->
    <div class="panel" id="panel-difficulty">
      <div class="cards-grid" id="diffCards"></div>
      <div class="box">
        <h3>Problem Spread</h3>
        <div class="pills" id="diffPills"></div>
      </div>
    </div>

    <!-- Progress -->
    <div class="panel" id="panel-progress">
      <div class="cards-grid" id="progressCards"></div>
      <div class="box">
        <h3>Monthly Submissions</h3>
        <div class="month-grid" id="monthGrid"></div>
      </div>
    </div>

    <!-- Contest -->
    <div class="panel" id="panel-contest">
      <div class="box">
        <h3>Contest Performance</h3>
        <table id="contestTable"></table>
      </div>
    </div>

    <!-- Insights -->
    <div class="panel" id="panel-insights">
      <div class="box">
        <h3>Your Insights</h3>
        <div id="insightsList"></div>
      </div>
    </div>

  </div>
</div>

<script>
  // ⚠️ After deploying backend on Render, replace this URL with your actual Render backend URL
  // Example: const API = "https://cf-analyzer-api.onrender.com";
  const API = "https://competitve-programming-analyser.onrender.com";

  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  function el(id) { return document.getElementById(id); }

  function switchTab(name, btn) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    el("panel-" + name).classList.add("active");
  }

  async function analyze() {
    const handle = el("handleInput").value.trim();
    if (!handle) return;

    el("searchBtn").disabled = true;
    el("loading").style.display = "block";
    el("dashboard").style.display = "none";
    el("error").style.display = "none";

    try {
      const [profile, skills, diff, topics, insights, progress, contest] = await Promise.all([
        fetch(`${API}/profile-analysis/${handle}`).then(r => r.json()),
        fetch(`${API}/skill-analysis/${handle}`).then(r => r.json()),
        fetch(`${API}/difficulty-analysis/${handle}`).then(r => r.json()),
        fetch(`${API}/analysis-tags/${handle}`).then(r => r.json()),
        fetch(`${API}/insights/${handle}`).then(r => r.json()),
        fetch(`${API}/progress/${handle}`).then(r => r.json()),
        fetch(`${API}/contest-performance/${handle}`).then(r => r.json()),
      ]);

      if (profile.error) throw new Error(profile.error);

      render({ profile, skills, diff, topics, insights, progress, contest });
      el("loading").style.display = "none";
      el("dashboard").style.display = "block";

    } catch(e) {
      el("loading").style.display = "none";
      el("error").style.display = "block";
      el("error").textContent = "Error: " + (e.message || "Could not connect to backend.");
    } finally {
      el("searchBtn").disabled = false;
    }
  }

  function bars(containerId, entries) {
    if (!entries.length) { el(containerId).innerHTML = "<p style='color:#999;font-size:13px'>No data</p>"; return; }
    const max = entries[0][1];
    el(containerId).innerHTML = entries.map(([tag, count]) => `
      <div class="tag-row">
        <div class="tag-name" title="${tag}">${tag}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.max(4,(count/max)*100)}%"></div></div>
        <div class="tag-cnt">${count}</div>
      </div>`).join("");
  }

  function cards(containerId, items) {
    el(containerId).innerHTML = items.map(([l,v]) => `
      <div class="card">
        <div class="label">${l}</div>
        <div class="value">${v ?? "—"}</div>
      </div>`).join("");
  }

  function render({ profile, skills, diff, topics, insights, progress, contest }) {
    el("avatarEl").textContent = profile.handle[0].toUpperCase();
    el("profileHandle").textContent = profile.handle;
    el("profileSubtitle").textContent = `${profile.rank} · Max: ${profile.max_rank} · Since ${profile.registration_year}`;

    cards("overviewCards", [
      ["Current Rating",  profile.current_rating],
      ["Max Rating",      profile.max_rating],
      ["Total Solved",    skills.total_solved],
      ["Submissions",     skills["total submissions"]],
      ["Friends Count",   profile.friends_of_count],
      ["Contribution",    profile.contribution],
    ]);
    bars("topTopics", Object.entries(topics).slice(0, 6));
    bars("allTopics", Object.entries(topics));

    cards("diffCards", [
      ["Avg Rating",      diff.average_rating],
      ["Hardest Problem", diff.hardest_problem],
      ["Easy (≤1200)",    diff.easy_problems],
      ["Medium",          diff.medium_problems],
      ["Hard (>1800)",    diff.hard_problems],
    ]);
    el("diffPills").innerHTML = `
      <div class="pill easy">✅ Easy: ${diff.easy_problems}</div>
      <div class="pill medium">⚡ Medium: ${diff.medium_problems}</div>
      <div class="pill hard">🔥 Hard: ${diff.hard_problems}</div>`;

    cards("progressCards", [
      ["Total Submissions", progress.total_submissions],
      ["Most Active Month", MONTHS[(progress.most_active_month || 1) - 1]],
      ["Trend",             progress.rating_trend],
    ]);
    const monthly = progress.monthly_activity || {};
    el("monthGrid").innerHTML = Object.entries(monthly)
      .sort((a,b) => +a[0] - +b[0])
      .map(([m,c]) => `
        <div class="month-cell">
          <div class="mname">${MONTHS[+m-1]}</div>
          <div class="mval">${c}</div>
        </div>`).join("");

    if (contest.message) {
      el("contestTable").innerHTML = `<tr><td>${contest.message}</td></tr>`;
    } else {
      el("contestTable").innerHTML = `
        <tr><th>Metric</th><th>Value</th></tr>
        <tr><td>Best Rank</td><td>${contest["Best Rank"]}</td></tr>
        <tr><td>Worst Rank</td><td>${contest["Worst Rank"]}</td></tr>
        <tr><td>Average Rank</td><td>${contest["Avg Rank"]}</td></tr>
        <tr><td>Rating Change</td><td>${contest["Rating change"]}</td></tr>
        <tr><td>Rating Trend</td><td>${contest["Rating Trend"]}</td></tr>`;
    }

    const icons = ["🎯","📚","🚀","💡","🏆","⚡"];
    el("insightsList").innerHTML = (insights.insights || [])
      .map((txt,i) => `
        <div class="insight-item">
          <span class="icon">${icons[i % icons.length]}</span>
          <span>${txt}</span>
        </div>`).join("");
  }

  el("handleInput").addEventListener("keydown", e => { if (e.key === "Enter") analyze(); });
</script>
</body>
</html>
